[project]
site_name = "{{ cookiecutter.project_name }}"
site_url = "https://{{ cookiecutter.github_repo_owner }}.github.io/{{ cookiecutter.package_name }}/"
repo_url = "https://github.com/{{ cookiecutter.github_repo_owner }}/{{ cookiecutter.package_name }}"
repo_name = "{{ cookiecutter.github_repo_owner }}/{{ cookiecutter.package_name }}"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Usage" = "usage.md" },
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
